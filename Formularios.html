<!DOCTYPE html>
<html lang="en">

<head>
    <title>Formularios</title>
</head>

<body>
    <header>
        <h1>Formulario de registro</h1>
    </header>
    <section>
        <form>
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" />
            </div>
            <br>
            <div>
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" />
            </div>
            <br>
            <div>
                <label for="modalidad">Modalidad de Cursada:</label>

                <input type="radio" name="modalidad" id="On-Demand">
                <label for="modalidad">On-demand</label>


                <input type="radio" name="modalidad" id="En vivo">
                <label for="En vivo">En vivo</label>

            </div>
            <br>
            <div>
                <label for="email">Correo:</label>
                <input type="email" id="email" />
            </div>
            <br>
            <div>
                <input type="checkbox" id="informacion">
                <label for="informacion">Deseo recibir información sobre nuevos posteos en la plataforma de
                    Nucba.</label>
                <br><br>
                <input type="checkbox" id="terminos">
                <label for="terminos">Declaro que lei los términos y condiciones y estoy listo para convertirme en
                    desarollador Web Full Stack.</label>
            </div>
            <br>
            <div>
                <button type="submit">Enviar</button>
            </div>


        </form>

    </section>

</body>

</html>
